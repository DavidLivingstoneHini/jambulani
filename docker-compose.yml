version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jambulani
      POSTGRES_USER: jambulani
      POSTGRES_PASSWORD: jambulani
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jambulani"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./jambulani-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: "super-secret-key-change-in-production-please"
      DEBUG: "True"
      POSTGRES_DB: jambulani
      POSTGRES_USER: jambulani
      POSTGRES_PASSWORD: jambulani
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./jambulani-frontend
      target: production
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
      NUXT_PUBLIC_MEDIA_BASE: http://localhost:8000
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  media_files:
  static_files:
