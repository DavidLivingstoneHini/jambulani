version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jambulani
      POSTGRES_USER: jambulani
      POSTGRES_PASSWORD: jambulani
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jambulani"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: "super-secret-key-change-in-production-please"
      DEBUG: "True"
      POSTGRES_DB: jambulani
      POSTGRES_USER: jambulani
      POSTGRES_PASSWORD: jambulani
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  media_files:
  static_files:
